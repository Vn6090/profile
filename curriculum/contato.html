<body class="bg-light d-flex flex-column min-vh-100">

    <!-- ============================ CONTEÚDO PRINCIPAL (FORMULÁRIO) ============================ -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card shadow p-4 border-0">
                    <div class="card-body">
                        <h3 class="mb-4 text-center fw-bold">Proposta de Vaga</h3>
                        
                        <form id="formVaga">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nome da Empresa</label>
                                    <input type="text" class="form-control" id="nomeEmpresa" placeholder="Microsoft" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email da Empresa</label>
                                    <input type="email" class="form-control" id="emailEmpresa" placeholder="rh@empresa.com" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Telefone</label>
                                    <input type="tel" class="form-control" id="telefoneEmpresa" placeholder="(11) 99999-9999" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Área de Atuação</label>
                                    <input type="text" class="form-control" id="atuacaoEmpresa" placeholder="Desenvolvimento Front-end" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Informações referentes à vaga</label>
                                <textarea class="form-control" id="infVagas" rows="4" placeholder="Descreva os requisitos, benefícios e detalhes da vaga aqui..." required></textarea>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <button type="reset" class="btn btn-outline-secondary">
                                    <i class="fas fa-eraser"></i> Limpar
                                </button>
                                <button type="button" class="btn btn-primary" onclick="enviarEmail()">
                                    <i class="fas fa-paper-plane"></i> Enviar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto sticky-bottom">

            <div class="row d-flex justify-content-between align-items-center">

                    <p class="mb-0"><i class="fas fa-envelope"></i> mouravinicius872@gmail.com</p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function enviarEmail() {
            var nomeEmpresa = document.getElementById('nomeEmpresa').value;
            var emailEmpresa = document.getElementById('emailEmpresa').value;
            var telefone = document.getElementById('telefoneEmpresa').value;
            var area = document.getElementById('atuacaoEmpresa').value;
            var informacoes = document.getElementById('infVagas').value;

            if(nomeEmpresa === "" || informacoes === "") {
                alert("Por favor, preencha pelo menos o Nome da Empresa e as Informações.");
                return;
            }

            var destinatario = "mouravinicius872@gmail.com";
            var assunto = "Nova Proposta de Vaga - " + nomeEmpresa;
            var corpoMensagem = "Olá Vinícius,\n\nRecebi uma proposta de vaga com os seguintes dados:\n\n" +
                "Empresa: " + nomeEmpresa + "\n" +
                "Email de Contato: " + emailEmpresa + "\n" +
                "Telefone: " + telefone + "\n" +
                "Área: " + area + "\n\n" +
                "Informações:\n" + informacoes;
            var mailtoLink = "mailto:" + destinatario + "?subject=" + encodeURIComponent(assunto) + "&body=" + encodeURIComponent(corpoMensagem);

            window.location.href = mailtoLink;
        }
    </script>
